<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vordrasil Interactive Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <button id="back-btn" onclick="handleBackNavigation()">← Back to World Map</button>

    <div id="top-search" role="search">
        <div class="search-bar">
            <input id="search-input" type="text" placeholder="Search Locations, Names, or Events" aria-label="Search locations" />
            <button id="search-clear" type="button">×</button>
        </div>
    </div>

    <div id="map-controls">
        <div class="controls-row">
            <button id="reset-view-btn" type="button">Reset View</button>
            <button id="cog-btn" class="icon-btn" aria-haspopup="true" aria-expanded="false" aria-controls="cog-menu">⚙</button>
        </div>

        <div id="cog-menu" class="cog-menu" role="menu" aria-hidden="true">
            <div class="toggle-group">
                <span class="toggle-text">Location Popups</span>
                <input id="panel-toggle-btn" class="toggle-input" type="checkbox" aria-label="Toggle location panel mode" />
                <label for="panel-toggle-btn" class="toggle-label">
                    <span class="toggle-switch" aria-hidden="true"></span>
                </label>
            </div>

            <div id="panel-location-group" class="toggle-group panel-location-group">
                <span class="toggle-text panel-location-text">Panel Side: Left</span>
                <input id="panel-side-toggle-btn" class="toggle-input" type="checkbox" aria-label="Toggle popup panel location" />
                <label for="panel-side-toggle-btn" class="toggle-label">
                    <span class="toggle-switch" aria-hidden="true"></span>
                </label>
            </div>
        </div>
    </div>

    <div id="popup-panel" class="popup-panel" aria-live="polite" aria-hidden="true"></div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/projektpro-leaflet-smoothwheelzoom@0.1.4/Leaflet.SmoothWheelZoom.min.js"></script>
    
    <script src="main.js"></script>
</body>
</html>
